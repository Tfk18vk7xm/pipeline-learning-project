name: First CI Pipeline   #Automatically validate code ater pus

on:    #Pipeline starts when code is pushed to main branch
  push:
    branches:
      - main

jobs: #Major execution section
  build-and-validate:
    runs-on: ubuntu-latest #Runner

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Application Validation
        run: python app.py